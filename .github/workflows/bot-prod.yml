name: Deploy Bot

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Default to 'prod' for tags, 'dev' for pushes to main/master,
    # and allow manual override via workflow_dispatch.
    environment: ${{ inputs.environment || (github.ref_type == 'tag' && 'prod' || 'dev') }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: latest
      - name: Install dependencies
        run: npm install
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: bot
          # Use 'preCommands' to upload secrets with an explicit name, bypassing action-level secret handling issues
          preCommands: |
            echo '${{ secrets.SECRET_TELEGRAM_API_TOKEN }}' | npx wrangler secret put SECRET_TELEGRAM_API_TOKEN --name ${{ (inputs.environment || (github.ref_type == 'tag' && 'prod' || 'dev')) == 'dev' && 'tux-robot-dev' || 'tux-robot' }}
            echo '${{ secrets.TAVILY_API_KEY }}' | npx wrangler secret put TAVILY_API_KEY --name ${{ (inputs.environment || (github.ref_type == 'tag' && 'prod' || 'dev')) == 'dev' && 'tux-robot-dev' || 'tux-robot' }}
          # Use 'dev' environment in wrangler.toml if the GitHub environment is 'dev'
          command: deploy --env ${{ (inputs.environment || (github.ref_type == 'tag' && 'prod' || 'dev')) == 'dev' && 'dev' || 'production' }}
