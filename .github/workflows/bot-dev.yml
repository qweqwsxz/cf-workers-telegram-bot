name: Deploy Bot (Dev)

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'bot/**'
      - 'packages/shared/**'
      - '.github/workflows/bot-dev.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - name: Install dependencies
        run: npm install
      - name: Check secrets
        run: |
          if [ -z "${{ secrets.SECRET_TELEGRAM_API_TOKEN }}" ]; then
            echo "Error: SECRET_TELEGRAM_API_TOKEN is empty. Please set it in GitHub Secrets."
            exit 1
          fi
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: bot
          environment: dev
          secrets: |
            SECRET_TELEGRAM_API_TOKEN
            TAVILY_API_KEY
        env:
          SECRET_TELEGRAM_API_TOKEN: ${{ secrets.SECRET_TELEGRAM_API_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
